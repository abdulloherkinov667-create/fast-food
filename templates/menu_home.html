<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Gusto & Co. — Menyu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --green: #1a2e1a;
        --green-mid: #2d4a2d;
        --gold: #b8962e;
        --cream: #f5f3ec;
        --white: #ffffff;
        --text: #1a1a1a;
        --muted: #6b6b5a;
        --border: #e0ddd4;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Montserrat", sans-serif;
        background: var(--cream);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
        padding-bottom: 90px;
      }

      /* ── ANIMATSIYALAR ── */
      @keyframes shimmer {
        0% { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      @keyframes popIn {
        0% { transform: scale(0.9); opacity: 0; }
        70% { transform: scale(1.03); }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes badgePulse {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(184, 150, 46, 0.7); }
        70% { transform: scale(1.15); box-shadow: 0 0 0 6px rgba(184, 150, 46, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(184, 150, 46, 0); }
      }

      /* HEADER */
      .top-header {
        text-align: center;
        padding: 24px 20px 10px;
        background: var(--cream);
      }
      .logo {
        font-family: "Playfair Display", serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--green);
        text-decoration: none;
        display: inline-block;
      }
      .logo em { font-style: italic; }

      .page-header {
        text-align: center;
        padding: 20px 20px 15px;
        width: 100%;
        display: block;
        clear: both;
        animation: fadeUp 0.6s 0.1s ease both;
      }
      .page-header p {
        font-size: 13px;
        letter-spacing: 4px;
        color: var(--muted);
        font-weight: 500;
        text-transform: uppercase;
      }

      /* FILTERS */
      .filters {
        padding: 0 40px 30px;
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        animation: fadeUp 0.6s 0.18s ease both;
      }
      .filter-pill {
        padding: 11px 22px;
        border-radius: 30px;
        font-size: 12px;
        font-weight: 500;
        border: 1.5px solid var(--border);
        background: var(--white);
        color: var(--text);
        cursor: pointer;
        transition: all 0.22s, transform 0.15s;
        font-family: "Montserrat", sans-serif;
      }
      .filter-pill:hover {
        border-color: var(--green);
        color: var(--green);
        transform: translateY(-2px);
      }
      .filter-pill:active { transform: scale(0.96); }
      .filter-pill.active {
        background: var(--green);
        color: #fff;
        border-color: var(--green);
        box-shadow: 0 4px 14px rgba(26, 46, 26, 0.2);
      }

      /* GRID */
      .menu-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        padding: 0 40px 40px;
        max-width: 1300px;
        margin: 0 auto;
      }

      /* CARD */
      .card {
        background: var(--white);
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid var(--border);
        cursor: pointer;
        transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease;
        opacity: 0;
        animation: fadeUp 0.55s ease both;
      }
      .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      }

      .card-img {
        position: relative;
        height: 240px;
        overflow: hidden;
        background: #e8e5dc;
      }
      .card-img::before {
        content: ""; position: absolute; inset: 0; z-index: 1;
        background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.45) 50%, transparent 100%);
        background-size: 400px 100%; animation: shimmer 1.6s infinite;
      }
      .card-img img {
        width: 100%; height: 100%; object-fit: cover; display: block;
        position: absolute; inset: 0; opacity: 0; transition: opacity 0.5s ease;
      }
      .card-img img.loaded { opacity: 1; }
      .card-img.img-ready::before { display: none; }

      .card-badge {
        position: absolute; top: 14px; left: 14px; z-index: 3;
        background: var(--gold); color: #fff; border-radius: 20px;
        padding: 5px 12px; font-size: 11px; font-weight: 700;
        animation: popIn 0.4s 0.3s ease both;
      }
      .card-body { padding: 20px; }
      
      .card-cat {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 8px;
      }
      .card-name {
        font-family: "Playfair Display", serif;
        font-size: 20px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 8px;
        line-height: 1.25;
      }
      .card-ingredients {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.65;
        margin-bottom: 18px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card-footer {
        display: flex; align-items: center; justify-content: space-between;
        padding-top: 16px; border-top: 1px solid var(--border);
      }
      .card-price {
        font-family: "Playfair Display", serif; font-size: 20px; font-weight: 700; color: var(--gold);
      }
      .card-price span { font-family: "Montserrat", sans-serif; font-size: 11px; color: var(--muted); }
      
      .add-btn {
        background: var(--green); color: #fff; border: none; border-radius: 30px;
        padding: 10px 18px; font-family: "Montserrat", sans-serif; font-size: 11px;
        font-weight: 700; letter-spacing: 1px; cursor: pointer;
        transition: all 0.22s; display: flex; align-items: center; gap: 6px; white-space: nowrap;
      }
      .add-btn:hover { background: var(--green-mid); transform: scale(1.04); }
      .add-btn.in-cart { background: var(--gold); }

      /* MODAL (BOTTOM SHEET) */
      .sheet-overlay {
        position: fixed; inset: 0; z-index: 500; background: rgba(0, 0, 0, 0);
        pointer-events: none; transition: background 0.32s ease, backdrop-filter 0.32s ease;
        backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
      }
      .sheet-overlay.open {
        background: rgba(0, 0, 0, 0.42); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); pointer-events: all;
      }
      .sheet {
        position: fixed; left: 0; right: 0; bottom: 0; z-index: 501; background: var(--white);
        border-radius: 20px 20px 0 0; height: 60vh; transform: translateY(100%);
        transition: transform 0.4s cubic-bezier(0.32, 0, 0.15, 1);
        display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 -8px 50px rgba(0, 0, 0, 0.2);
      }
      .sheet.open { transform: translateY(0); }
      .sheet-handle { flex-shrink: 0; display: flex; justify-content: center; align-items: center; padding: 12px 0 6px; }
      .sheet-handle-bar { width: 40px; height: 4px; border-radius: 2px; background: var(--border); }

      .sheet-img-top { flex-shrink: 0; width: 100%; height: 200px; overflow: hidden; background: #e8e5dc; position: relative; }
      .sheet-img-top img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.45s ease; }
      .sheet-img-top img.loaded { opacity: 1; }
      .sheet-img-top.img-ready::before { display: none; }
      .sheet-img-top::after {
        content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
        background: linear-gradient(to top, var(--white), transparent); z-index: 2;
      }

      .sheet-inner-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
      .sheet-content { padding: 15px 22px 0; }
      .sheet-cat { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
      .sheet-name { font-family: "Playfair Display", serif; font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
      .sheet-ingredients { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }

      .sheet-footer {
        flex-shrink: 0; padding: 15px 22px 35px; border-top: 1px solid var(--border);
        display: flex; align-items: center; gap: 12px; background: var(--white);
      }
      .sheet-price { font-family: "Playfair Display", serif; font-size: 22px; font-weight: 700; color: var(--gold); }
      .sheet-price span { font-family: "Montserrat", sans-serif; font-size: 11px; color: var(--muted); }
      
      .qty-row { display: flex; align-items: center; background: var(--cream); border-radius: 30px; border: 1.5px solid var(--border); overflow: hidden; }
      .qty-btn { width: 38px; height: 38px; border: none; background: none; font-size: 18px; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; }
      .qty-btn:hover { background: var(--border); }
      .qty-num { min-width: 30px; text-align: center; font-size: 14px; font-weight: 700; }
      .qty-num.bump { animation: popIn 0.2s ease; }
      
      .sheet-add-btn {
        flex: 1; background: var(--green); color: #fff; border: none; border-radius: 30px;
        padding: 13px 14px; font-family: "Montserrat", sans-serif; font-size: 12px; font-weight: 700;
        cursor: pointer; transition: all 0.22s; box-shadow: 0 4px 14px rgba(26, 46, 26, 0.2);
      }
      .sheet-add-btn:hover { background: var(--green-mid); transform: translateY(-1px); }
      .sheet-add-btn.go-cart { background: var(--gold); box-shadow: 0 4px 14px rgba(184, 150, 46, 0.25); }

      /* NAVBAR */
      .bottom-nav {
        position: fixed; bottom: 0; left: 0; right: 0; height: 68px;
        background: rgba(255, 255, 255, 0.97); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 400;
        box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.03);
      }
      .bottom-nav-item {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: var(--muted); text-decoration: none; font-size: 10px; font-weight: 500; gap: 4px; flex: 1; height: 100%; position: relative;
      }
      .bottom-nav-item svg {
        width: 23px; height: 23px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: fill 0.2s, color 0.2s;
      }
      .bottom-nav-item:hover, .bottom-nav-item.active { color: var(--text); }
      .bottom-nav-item.active svg { fill: currentColor; }
      .bottom-nav-item.active span { font-weight: 600; }

      .nav-badge {
        position: absolute; top: 6px; right: calc(50% - 22px);
        background: var(--gold); color: #fff; min-width: 16px; height: 16px;
        border-radius: 8px; font-size: 9px; font-weight: 800; display: none;
        align-items: center; justify-content: center; padding: 0 4px;
        animation: badgePulse 2s infinite;
      }
      .nav-badge.show { display: flex; }

      .toast {
        position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%) translateY(90px);
        background: var(--green); color: #fff; border-radius: 30px; padding: 13px 26px;
        font-size: 12px; font-weight: 600; z-index: 900; opacity: 0;
        transition: all 0.38s cubic-bezier(0.32, 0, 0.2, 1); box-shadow: 0 6px 24px rgba(26, 46, 26, 0.2);
        display: flex; align-items: center; gap: 8px; pointer-events: none;
      }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      /* RESPONSIVE */
      @media (max-width: 900px) {
        .page-header { padding: 15px 15px 8px; }
        .filters {
          padding: 0 16px 20px; justify-content: flex-start; flex-wrap: nowrap;
          overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .filters::-webkit-scrollbar { display: none; }
        .filter-pill { flex-shrink: 0; padding: 9px 16px; font-size: 11px; }
        
        .menu-grid { grid-template-columns: 1fr; gap: 15px; padding: 0 16px 40px; }
        .card-img { height: 210px; }
        .sheet { height: 75vh; }
      }
      @media (min-width: 901px) and (max-width: 1150px) {
        .menu-grid { grid-template-columns: repeat(2, 1fr); }
      }
      @media (min-width: 700px) {
        .sheet { left: 50%; right: auto; width: 100%; max-width: 500px; transform: translateX(-50%) translateY(100%); }
        .sheet.open { transform: translateX(-50%) translateY(0); }
      }
    </style>
  </head>
  <body>

    <div class="top-header">
      <a href="{% url 'menu_home' %}" class="logo">Gusto <em>&</em> Co.</a>
    </div>

    <div class="page-header">
      <p>premium taomlar</p>
    </div>

    <div class="filters">
      <button class="filter-pill active" data-f="all">Barchasi</button>
      {% for category in categories %}
        <button class="filter-pill" data-f="{{ category.id }}">{{ category.name }}</button>
      {% endfor %}
    </div>

    <div class="menu-grid" id="menuGrid"></div>

    <div class="bottom-nav">
      <a href="{% url 'menu_home' %}" class="bottom-nav-item active">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        <span>Menyu</span>
      </a>

      <a href="{% url 'savat_page' %}" class="bottom-nav-item">
        <svg viewBox="0 0 24 24">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 01-8 0" />
        </svg>
        <span>Savat</span>
        <span class="nav-badge" id="cartBadge">0</span>
      </a>

      <a href="{% url 'profile_user' %}" class="bottom-nav-item">
        <svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>Profil</span>
      </a>
    </div>

    <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
    <div class="sheet" id="sheet">
      <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
      <div class="sheet-img-top" id="sheetImgWrap">
        <img id="sheetImg" src="" alt="" />
      </div>
      <div class="sheet-inner-scroll">
        <div class="sheet-content">
          <div class="sheet-cat" id="sCat"></div>
          <div class="sheet-name" id="sName"></div>
          <div class="sheet-ingredients" id="sIngredients"></div>
        </div>
      </div>
      <div class="sheet-footer">
        <div class="sheet-price" id="sPrice"></div>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <div class="qty-num" id="qtyNum">1</div>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
        <button class="sheet-add-btn" id="sheetAddBtn" onclick="addFromSheet()">+ Qo'shish</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const ITEMS = [
        {% for product in products %}
        {
          id: {{ product.id }},
          cat: "{{ product.category_product.id }}",
          catLabel: "{{ product.category_product.name }}",
          name: "{{ product.name }}",
          ingredients: "{{ product.ingredients|escapejs }}",
          price: "{{ product.price }}",
          badge: {% if product.count < 5 %}"★ Tugamoqda"{% else %}null{% endif %},
          img: "{{ product.product_image.url }}",
        },
        {% endfor %}
      ];

      let cart = {}, activeItem = null, modalQty = 1, currentFilter = "all";

      function renderGrid() {
        const grid = document.getElementById("menuGrid");
        grid.innerHTML = "";
        const filtered = currentFilter === "all" ? ITEMS : ITEMS.filter((i) => i.cat === currentFilter);
        
        if(filtered.length === 0) {
          grid.innerHTML = "<p style='text-align:center; grid-column: 1/-1; color: var(--muted); padding: 40px;'>Bu kategoriyada mahsulot topilmadi.</p>";
          return;
        }

        filtered.forEach((item, idx) => {
          const inCart = cart[item.id] > 0;
          const div = document.createElement("div");
          div.className = "card";
          div.style.animationDelay = idx * 0.05 + "s";
          div.onclick = () => openSheet(item);
          div.innerHTML = `
            <div class="card-img" id="ci_${item.id}">
              <img src="${item.img}" alt="${item.name}" loading="lazy">
              ${item.badge ? `<div class="card-badge">${item.badge}</div>` : ""}
            </div>
            <div class="card-body">
              <div class="card-cat">${item.catLabel}</div>
              <div class="card-name">${item.name}</div>
              <div class="card-ingredients">${item.ingredients}</div>
              <div class="card-footer">
                <div class="card-price">${parseFloat(item.price).toLocaleString('uz-UZ')} <span>so'm</span></div>
                <button class="add-btn ${inCart ? "in-cart" : ""}" onclick="quickAdd(event,${item.id})">
                  ${inCart ? "✓ Savatda" : "+ Qo'shish"}
                </button>
              </div>
            </div>`;
          grid.appendChild(div);

          const img = div.querySelector("img");
          img.onload = () => {
            img.classList.add("loaded");
            document.getElementById("ci_" + item.id).classList.add("img-ready");
          };
          if (img.complete && img.naturalWidth > 0) {
            img.classList.add("loaded");
            document.getElementById("ci_" + item.id).classList.add("img-ready");
          }
        });
      }

      function quickAdd(e, id) {
        e.stopPropagation();
        if (cart[id]) { showToast("Allaqachon savatda!"); return; }
        cart[id] = 1;
        updateBadge();
        showToast("✓ Savatga qo'shildi");
        renderGrid();
      }

      function openSheet(item) {
        activeItem = item;
        modalQty = cart[item.id] || 1;
        const imgEl = document.getElementById("sheetImg");
        const wrap = document.getElementById("sheetImgWrap");
        imgEl.classList.remove("loaded");
        wrap.classList.remove("img-ready");
        imgEl.src = item.img;
        imgEl.onload = () => { imgEl.classList.add("loaded"); wrap.classList.add("img-ready"); };
        
        if (imgEl.complete && imgEl.naturalWidth > 0) {
          imgEl.classList.add("loaded"); wrap.classList.add("img-ready");
        }

        document.getElementById("sCat").textContent = item.catLabel;
        document.getElementById("sName").textContent = item.name;
        document.getElementById("sIngredients").textContent = item.ingredients;
        document.getElementById("sPrice").innerHTML = `${parseFloat(item.price).toLocaleString('uz-UZ')} <span>so'm</span>`;
        document.getElementById("qtyNum").textContent = modalQty;

        const btn = document.getElementById("sheetAddBtn");
        if (cart[item.id]) {
          btn.textContent = "✓ Savatga o'tish";
          btn.classList.add("go-cart");
        } else {
          btn.textContent = "+ Qo'shish";
          btn.classList.remove("go-cart");
        }

        document.getElementById("sheetOverlay").classList.add("open");
        document.getElementById("sheet").classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function closeSheet() {
        document.getElementById("sheetOverlay").classList.remove("open");
        document.getElementById("sheet").classList.remove("open");
        document.body.style.overflow = "";
      }

      function changeQty(d) {
        modalQty = Math.max(1, modalQty + d);
        const el = document.getElementById("qtyNum");
        el.textContent = modalQty;
        el.classList.remove("bump");
        void el.offsetWidth;
        el.classList.add("bump");
      }

      function addFromSheet() {
        if (!activeItem) return;
        if (cart[activeItem.id]) {
          closeSheet();
          window.location.href = "{% url 'savat_page' %}";
          return;
        }
        cart[activeItem.id] = modalQty;
        updateBadge();
        showToast("✓ Savatga qo'shildi");
        renderGrid();
        const btn = document.getElementById("sheetAddBtn");
        btn.textContent = "✓ Savatga o'tish";
        btn.classList.add("go-cart");
      }

      function updateBadge() {
        const n = Object.values(cart).reduce((a, b) => a + b, 0);
        const b = document.getElementById("cartBadge");
        b.textContent = n;
        if (n > 0) b.classList.add("show"); else b.classList.remove("show");
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerHTML = msg;
        t.classList.add("show");
        clearTimeout(t._tid);
        t._tid = setTimeout(() => t.classList.remove("show"), 2200);
      }

      document.querySelectorAll(".filter-pill").forEach((p) => {
        p.addEventListener("click", function () {
          document.querySelectorAll(".filter-pill").forEach((x) => x.classList.remove("active"));
          this.classList.add("active");
          currentFilter = this.dataset.f;
          renderGrid();
        });
      });

      let startY = 0;
      const sh = document.getElementById("sheet");
      sh.addEventListener("touchstart", (e) => (startY = e.touches[0].clientY), { passive: true });
      sh.addEventListener("touchend", (e) => {
        if (e.changedTouches[0].clientY - startY > 60) closeSheet();
      }, { passive: true });

      renderGrid();
    </script>
  </body>
</html>
